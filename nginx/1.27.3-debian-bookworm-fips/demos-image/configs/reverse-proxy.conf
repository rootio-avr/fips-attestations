# Nginx FIPS Demo: Reverse Proxy Configuration
# This demonstrates HTTPS reverse proxy with FIPS-compliant TLS

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;

    # Performance
    sendfile on;
    keepalive_timeout 65;

    # HTTPS Reverse Proxy Server
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # SSL Certificate
        ssl_certificate /etc/nginx/ssl/self-signed.crt;
        ssl_certificate_key /etc/nginx/ssl/self-signed.key;

        # FIPS-compliant SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # Proxy to backend (example)
        location / {
            # Demo: proxy to httpbin.org for testing
            proxy_pass https://httpbin.org;
            proxy_set_header Host httpbin.org;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            return 200 "Nginx FIPS Reverse Proxy - Healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
