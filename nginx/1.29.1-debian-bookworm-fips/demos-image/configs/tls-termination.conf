# Nginx FIPS Demo: TLS Termination Configuration
# This demonstrates SSL/TLS offloading with FIPS-compliant TLS
# Frontend: HTTPS (FIPS), Backend: HTTP

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'SSL: $ssl_protocol/$ssl_cipher';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    keepalive_timeout 65;

    # Upstream backend servers (HTTP)
    upstream backend {
        # Example: local backend services
        server 127.0.0.1:8080;
        # server backend1:8080;
        # server backend2:8080;
    }

    # HTTPS Frontend (TLS Termination)
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # SSL Certificate
        ssl_certificate /etc/nginx/ssl/self-signed.crt;
        ssl_certificate_key /etc/nginx/ssl/self-signed.key;

        # FIPS-compliant SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256';
        ssl_prefer_server_ciphers on;

        # SSL session cache for performance
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # Proxy to HTTP backend
        location / {
            # Terminate SSL here, forward as HTTP
            proxy_pass http://backend;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # SSL info headers (inform backend about original SSL)
            proxy_set_header X-SSL-Protocol $ssl_protocol;
            proxy_set_header X-SSL-Cipher $ssl_cipher;

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health check endpoint
        location /health {
            return 200 "Nginx FIPS TLS Termination - Healthy\n";
            add_header Content-Type text/plain;
        }

        # SSL/TLS info endpoint (for testing)
        location /ssl-info {
            return 200 "SSL Protocol: $ssl_protocol\nSSL Cipher: $ssl_cipher\nFIPS Mode: Active\n";
            add_header Content-Type text/plain;
        }
    }
}
