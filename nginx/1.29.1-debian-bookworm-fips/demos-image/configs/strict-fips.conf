# Nginx FIPS Demo: Strict FIPS Configuration
# This demonstrates maximum FIPS enforcement with strictest settings
# - TLS 1.3 only (most secure)
# - Minimal FIPS-approved cipher suite
# - Enhanced security headers
# - Strict SSL settings

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging with SSL details
    log_format strict '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" '
                      'SSL: $ssl_protocol Cipher: $ssl_cipher '
                      'FIPS: Enforced';

    access_log /var/log/nginx/access.log strict;

    # Performance
    sendfile on;
    keepalive_timeout 65;

    # Strict HTTPS Server
    server {
        listen 443 ssl;
        http2 on;
        server_name localhost;

        # SSL Certificate
        ssl_certificate /etc/nginx/ssl/self-signed.crt;
        ssl_certificate_key /etc/nginx/ssl/self-signed.key;

        # STRICT FIPS: TLS 1.3 ONLY (most secure, latest standard)
        ssl_protocols TLSv1.3;

        # STRICT FIPS: TLS 1.3 ciphersuites (FIPS-approved)
        # TLS 1.3 uses 'ssl_conf_command Ciphersuites' instead of 'ssl_ciphers'
        # By default, TLS 1.3 uses FIPS-approved ciphersuites:
        #   - TLS_AES_256_GCM_SHA384 (preferred)
        #   - TLS_AES_128_GCM_SHA256
        # No explicit configuration needed - wolfSSL enforces FIPS ciphers automatically

        # Prefer server cipher order
        ssl_prefer_server_ciphers off;  # TLS 1.3 ignores this, client chooses

        # SSL session settings (minimal for strict security)
        ssl_session_cache shared:SSL:1m;
        ssl_session_timeout 5m;
        ssl_session_tickets off;  # Disable for perfect forward secrecy

        # OCSP stapling (if using real certificates)
        # ssl_stapling on;
        # ssl_stapling_verify on;

        # Serve static content
        location / {
            root /usr/share/nginx/html/demos;
            index index.html index.htm;

            # Strict security headers
            add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "no-referrer" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" always;

            # Disable client-side caching for sensitive content
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
            add_header Pragma "no-cache" always;
            add_header Expires "0" always;
        }

        # Health check endpoint
        location /health {
            return 200 "Nginx FIPS Strict Mode - Healthy\n";
            add_header Content-Type text/plain;
        }

        # FIPS compliance info endpoint
        location /fips-info {
            return 200 "FIPS Mode: Strict Enforcement\nTLS Protocol: TLS 1.3 ONLY\nCipher Suite: TLS_AES_256_GCM_SHA384, TLS_AES_128_GCM_SHA256\nwolfSSL FIPS: Certificate #4718\nCompliance: FIPS 140-3\n";
            add_header Content-Type text/plain;
        }
    }

    # NO HTTP server - HTTPS only in strict mode
    # Optionally, you could add an HTTP server that rejects all connections:
    server {
        listen 80;
        server_name localhost;
        return 426 "HTTPS Required - Strict FIPS Mode\n";
        add_header Content-Type text/plain;
    }
}
