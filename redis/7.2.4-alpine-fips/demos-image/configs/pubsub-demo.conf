# Redis FIPS Demo: Pub/Sub Configuration
# This demonstrates publish/subscribe messaging with FIPS compliance

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Security
protected-mode yes
# No password for demo simplicity (set requirepass for production)

# Pub/Sub specific settings
# Increase client output buffer for pub/sub clients
client-output-buffer-limit pubsub 64mb 16mb 60

# Disable persistence for pub/sub demo (messages are ephemeral)
save ""
appendonly no

# Logging
loglevel notice
logfile ""

# Performance
maxmemory 256mb
maxmemory-policy noeviction
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Advanced
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
activerehashing yes
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
hz 10
dynamic-hz yes
