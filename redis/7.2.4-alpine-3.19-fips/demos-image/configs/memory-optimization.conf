# Redis FIPS Demo: Memory Optimization Configuration
# This demonstrates memory limits and eviction policies with FIPS compliance

# Network
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Security
protected-mode yes
# No password for demo simplicity (set requirepass for production)

# Memory Management
maxmemory 128mb
# Eviction policy: Remove keys with nearest expiry time using LFU
maxmemory-policy allkeys-lfu
maxmemory-samples 5

# Lazy freeing (for large deletions)
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes
replica-lazy-flush yes
lazyfree-lazy-user-del yes

# Persistence (minimal for memory demo)
save 300 10
save 60 1000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Disable AOF for memory-focused demo
appendonly no

# Logging
loglevel notice
logfile ""

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Memory-efficient data structures
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# Active memory defragmentation (if available)
activerehashing yes

# Client buffers
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

hz 10
dynamic-hz yes
