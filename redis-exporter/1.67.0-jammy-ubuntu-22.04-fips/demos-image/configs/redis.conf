# Redis Configuration for FIPS Demo
# This configuration demonstrates Redis setup with FIPS considerations

################################################################################
# Network
################################################################################

# Bind to all interfaces for Docker networking
bind 0.0.0.0

# Default port
port 6379

# TCP backlog
tcp-backlog 511

# Close connection after client idle for N seconds (0 to disable)
timeout 0

# TCP keepalive
tcp-keepalive 300

################################################################################
# General
################################################################################

# Run as daemon (no for Docker)
daemonize no

# PID file
pidfile /var/run/redis_6379.pid

# Log level: debug, verbose, notice, warning
loglevel notice

# Log to stdout for Docker
logfile ""

# Number of databases
databases 16

################################################################################
# Snapshotting (Persistence)
################################################################################

# Save the DB to disk
save 900 1
save 300 10
save 60 10000

# Compress string objects using LZF
rdbcompression yes

# Checksum RDB files
rdbchecksum yes

# RDB filename
dbfilename dump.rdb

# Working directory
dir /data

################################################################################
# Replication
################################################################################

# Master-Replica replication settings
# (Configured via docker-compose for replicas)

# Replica serves read-only
replica-read-only yes

################################################################################
# Security
################################################################################

# Require password (disabled for demo, use secrets in production)
# requirepass your_secure_password_here

# Disable dangerous commands in production
# rename-command FLUSHDB ""
# rename-command FLUSHALL ""
# rename-command KEYS ""
# rename-command CONFIG ""

################################################################################
# Limits
################################################################################

# Max number of connected clients
maxclients 10000

# Max memory (disabled for demo)
# maxmemory 256mb

# Eviction policy
# maxmemory-policy allkeys-lru

################################################################################
# Append Only File (AOF)
################################################################################

# Enable AOF persistence
appendonly no

# AOF filename
appendfilename "appendonly.aof"

# fsync policy: always, everysec, no
appendfsync everysec

################################################################################
# Lua Scripting
################################################################################

# Max execution time for Lua scripts (milliseconds)
lua-time-limit 5000

################################################################################
# Slow Log
################################################################################

# Log queries slower than (microseconds)
slowlog-log-slower-than 10000

# Slow log max length
slowlog-max-len 128

################################################################################
# Latency Monitor
################################################################################

# Enable latency monitoring
latency-monitor-threshold 0

################################################################################
# Event Notification
################################################################################

# Keyspace notifications (disabled by default)
notify-keyspace-events ""

################################################################################
# Advanced Config
################################################################################

# Hash optimizations
hash-max-ziplist-entries 512
hash-max-ziplist-value 64

# List optimizations
list-max-ziplist-size -2
list-compress-depth 0

# Set optimizations
set-max-intset-entries 512

# Sorted set optimizations
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# HyperLogLog sparse representation
hll-sparse-max-bytes 3000

# Streams macro node max size / items
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Frequency of rehashing
hz 10

# Enable active defragmentation
activedefrag no

################################################################################
# TLS/SSL Configuration (Optional - for FIPS TLS demo)
################################################################################

# Uncomment to enable TLS (requires certificates)
# tls-port 6380
# port 0

# TLS certificates
# tls-cert-file /demo/certs/redis.crt
# tls-key-file /demo/certs/redis.key
# tls-ca-cert-file /demo/certs/ca.crt

# Require clients to authenticate
# tls-auth-clients yes

# TLS ciphers (FIPS-approved only)
# tls-ciphersuites TLS_AES_256_GCM_SHA384:TLS_AES_128_GCM_SHA256
# tls-ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256

# TLS protocol versions
# tls-protocols "TLSv1.2 TLSv1.3"

# Prefer server ciphers
# tls-prefer-server-ciphers yes

################################################################################
# Demo-Specific Settings
################################################################################

# Enable protected mode (no for demo, yes for production)
protected-mode no

# Enable cluster mode (no for standalone demo)
# cluster-enabled no
