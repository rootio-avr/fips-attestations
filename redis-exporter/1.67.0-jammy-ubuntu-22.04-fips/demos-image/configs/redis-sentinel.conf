# Redis Sentinel Configuration for FIPS Demo
# This configuration demonstrates Redis Sentinel setup

################################################################################
# Network
################################################################################

# Bind to all interfaces for Docker networking
bind 0.0.0.0

# Sentinel port
port 26379

# Run as daemon (no for Docker)
daemonize no

# PID file
pidfile /var/run/redis-sentinel.pid

# Log level
loglevel notice

# Log to stdout for Docker
logfile ""

################################################################################
# Sentinel Monitoring
################################################################################

# Monitor a master named "mymaster"
# sentinel monitor <master-name> <ip> <port> <quorum>
sentinel monitor mymaster redis-master 6379 2

# Master considered down after milliseconds without reply
sentinel down-after-milliseconds mymaster 5000

# How many replicas can be reconfigured simultaneously
sentinel parallel-syncs mymaster 1

# Failover timeout
sentinel failover-timeout mymaster 10000

################################################################################
# Security
################################################################################

# Sentinel password (disabled for demo)
# sentinel auth-pass mymaster your_password_here

################################################################################
# Notification Scripts
################################################################################

# Notification script called when something happens
# sentinel notification-script mymaster /path/to/notification.sh

# Client reconfiguration script
# sentinel client-reconfig-script mymaster /path/to/reconfig.sh

################################################################################
# Advanced
################################################################################

# Deny scripts execution
sentinel deny-scripts-reconfig yes
